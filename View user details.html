

{% extends 'homeindex.html' %}
{% block body %}




      <div class="container mt-5">
    <h2 class="mb-4">Registered Users</h2>
    <table id="registrationTable" class="table table-striped table-bordered">
      <thead>
        <tr>
            <th>#</th>
      <th>Name</th>
      <th>Photo</th>
      <th>Gender</th>
      <th>DOB</th><th>Mail ID</th>
      <th>Phone number</th>
      <th>Place</th>
      <th>Bio</th>
        </tr>
      </thead>
      <tbody>
        <!-- Sample Data Row -->
           {% for i in data %}
    <tr>
      <td>{{ forloop.counter }}</td>
      <td>{{ i.username }}</td>
      <td><img src="{{ i.photo }}" width="100" height="100"> </td>
      <td>{{ i.gender }}</td>
      <td>{{ i.dob }}</td>
        <td>&nbsp;{{ i.email }}</td>
      <td>{{ i.phone }}</td>
      <td>&nbsp;{{ i.place }}</td>
      <td>{{ i.bio }}&nbsp;</td>
    </tr>
      {% endfor %}
        <!-- Add more rows dynamically from backend -->
      </tbody>
    </table>
  </div>

{% endblock %}
