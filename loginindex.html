{#<!DOCTYPE html>#}
<html lang="en">
<head>
	<!-- Meta tags -->
	<title>Login</title>
	<meta name="keywords" content="Winter Login Form Responsive widget, Flat Web Templates, Android Compatible web template,
	Smartphone Compatible web template, free webdesigns for Nokia, Samsung, LG, SonyEricsson, Motorola web design" />
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!-- stylesheets -->
	<link rel="stylesheet" href="/static/login/css/font-awesome.css">
	<link rel="stylesheet" href="/static/login/css/style.css">
	<!-- google fonts  -->
	<link href="//fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
	<link href="//fonts.googleapis.com/css?family=Raleway:400,500,600,700" rel="stylesheet">
</head>
<body>
	<div class="agile-login">
        <h1 style="color: #0b2e13; margin-top: 45px; font-family: 'Times New Roman'"><b>Admin Login</b></h1>
		<div class="wrapper">
			<h2 style=" color: #0b2e13; font-family: 'Times New Roman';">Sign In</h2>
			<div class="w3ls-form">
				<form action="/myapp/login_post/" method="post">
                    {% csrf_token %}
					<label>Username</label>
					<input type="text" name="username" placeholder="Username" required/>
					<label>Password</label>
					<input type="password" name="password" placeholder="Password" required />
					<a href="#" class="pass" style="color: #a71d2a">Forgot Password ?</a>
					<input type="submit" value="Log In" />
				</form>
			</div>

			<div class="agile-icons">
				<a href="#"><span class="fa fa-twitter" aria-hidden="true"></span></a>
				<a href="#"><span class="fa fa-facebook"></span></a>
				<a href="#"><span class="fa fa-pinterest-p"></span></a>
			</div>
		</div>
		<br>

	</div>

</body>
</html>
