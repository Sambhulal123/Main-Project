{% extends 'homeindex.html' %}
{% block body %}

<form id="form1" name="form1" method="post" action="/myapp/changepw_post/">
  {% csrf_token %}

  <table class="table table-striped table-hover" border="1px" style="border-color: white;">
    <tr>
      <th>Current password</th>
      <td>
        <input type="password" class="form-control" name="textfield" id="textfield" />
      </td>
    </tr>
    <tr>
      <th>New password</th>
      <td>
        <input type="password" class="form-control" name="textfield2" id="textfield2" />
      </td>
    </tr>
    <tr>
      <th>Confirm password</th>
      <td>
        <input type="password" class="form-control" name="textfield3" id="textfield3" />
      </td>
    </tr>
    <tr>
      <td colspan="2" align="center">
        <input type="submit" class="btn btn-success" name="button" id="button" value="Submit" />
      </td>
    </tr>
  </table>
</form>

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-success alert-dismissible fade show text-center shadow-sm"
         role="alert" style="font-weight:400; font-size:16px;">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  {% endfor %}
{% endif %}

{% endblock %}
