{% block body %}








<head>
  <meta charset="UTF-8">
<title>View Comments</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h3 class="mb-4">View Comments</h3>

    <!-- Date Filter Inputs -->
    <div class="row mb-3">
      <div class="col-md-4">
        <label for="fromDate" class="form-label">From Date</label>
        <input type="date" id="fromDate" class="form-control">
      </div>
      <div class="col-md-4">
        <label for="toDate" class="form-label">To Date</label>
        <input type="date" id="toDate" class="form-control">
      </div>
    </div>

    <!-- Complaints Table -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover" id="complaintTable">
        <thead class="table-light">
   <tr>
      <th>#</th>
      <th>Date</th>
      <th>Time</th>
      <th>Post</th>
      <th>Comments</th>
      <th>User info</th>
        <th></th>
    </tr>

        </thead>
        <tbody>
          <!-- Sample Data Rows -->
   {% for i in data %}
    <tr>
    <td>&nbsp;{{ forloop.counter }}</td>
      <td>{{ i.date }}</td>
      <td>{{ i.time }}</td>
      <td><img src="{{ i.POST.photo }}"height="100" width="100"> </td>
      <td>{{ i.comments }}</td>
      <td>&nbsp;{{ i.USER.username }}<br>{{ i.USER.email }}</td>
<td><a href="/myapp/blockuser/{{ i.USER.id }}/{{ i.POST.USER.id }}/{{ i.id }}">Remove</a> </td>
    </tr>
      {% endfor %}
          <!-- Add more rows as needed -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

  <script>
    // Extend DataTables with custom date filtering
    $.fn.dataTable.ext.search.push(function (settings, data, dataIndex) {
      const min = document.getElementById('fromDate').value;
      const max = document.getElementById('toDate').value;
      const dateStr = data[1]; // Date is column index 1
      const date = new Date(dateStr);

      const minDate = min ? new Date(min) : null;
      const maxDate = max ? new Date(max) : null;

      if ((!minDate || date >= minDate) && (!maxDate || date <= maxDate)) {
        return true;
      }
      return false;
    });

    // Initialize DataTable and bind filter events
    $(document).ready(function () {
      const table = $('#complaintTable').DataTable({
        pageLength: 5
      });

      $('#fromDate, #toDate').on('change', function () {
        table.draw();
      });
    });
  </script>

{% endblock %}
